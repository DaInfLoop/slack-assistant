display_information:
    name: Slack Assistant
    description: Interact with your Home Assistant instance via Slack!
    background_color: "#149dc7"
features:
    app_home:
        home_tab_enabled: true
        messages_tab_enabled: true
        messages_tab_read_only_enabled: false
    bot_user:
        display_name: Slack Assistant
        always_online: false
    slash_commands:
      - command: /ha-ask
        url: https://slackassistant.dino.icu/slack/events
        description: Ask your Home Assistant to do something!
        usage_hint: turn on the lights...
        should_escape: false
    assistant_view:
        assistant_description: Interact with your Home Assistant instance via Slack!
        suggested_prompts: []
oauth_config:
    redirect_urls:
      - https://slackassistant.dino.icu/slack/oauth_redirect
    scopes:
        bot:
          - app_mentions:read
          - assistant:write
          - chat:write
          - commands
          - im:history
          - im:read
          - mpim:history
          - mpim:read
    pkce_enabled: false
settings:
    event_subscriptions:
        request_url: https://slackassistant.dino.icu/slack/events
        bot_events:
          - app_home_opened
          - app_mention
          - assistant_thread_started
          - message.im
    interactivity:
        is_enabled: true
        request_url: https://slackassistant.dino.icu/slack/events
    org_deploy_enabled: false
    socket_mode_enabled: false
    token_rotation_enabled: false
    is_mcp_enabled: false
